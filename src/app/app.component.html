<div class="registration-container">
  <h2>NutriGenius Registration</h2>
  
  <input type="text" [(ngModel)]="user.name" name="name" placeholder="Full Name">
  
  <input type="email" [(ngModel)]="user.email" name="email" placeholder="Email Address">
  
  <input type="password" [(ngModel)]="user.password" name="password" placeholder="Password">
  
  <input type="number" [(ngModel)]="user.weight" name="weight" placeholder="Weight (kg)">
  
  <input type="number" [(ngModel)]="user.height" name="height" placeholder="Height (cm)">
  
  <button (click)="onRegister()">Register Now</button>
</div>
