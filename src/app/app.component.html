<div class="bg-image-container"></div>
<div class="bg-overlay"></div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  
  <div *ngIf="currentPage === 'login'" class="text-center">
    <app-login></app-login>
    <div class="mt-3">
      <small class="text-white">Don't have an account? 
        <a href="javascript:void(0)" (click)="togglePage('register')" class="text-danger fw-bold text-decoration-none">Sign Up</a>
      </small>
    </div>
  </div>

  <div *ngIf="currentPage === 'register'">
    <div class="card shadow-lg p-4" style="width: 450px;">
      
      <div class="text-center mb-4">
        <h1 class="fw-bold mb-1">
          <span class="text-danger">Nutri</span><span class="text-white">Genius</span>
        </h1>
        <p class="text-muted small">Fuel Your Body, Find Your Genius</p>
      </div>

      <form (submit)="$event.preventDefault()">
        <div class="mb-3">
          <label class="form-label small fw-bold text-white">Full Name</label>
          <input type="text" [(ngModel)]="user.name" name="name" class="form-control" placeholder="John Doe">
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold text-white">Email Address</label>
          <input type="email" [(ngModel)]="user.email" name="email" class="form-control" placeholder="example@mail.com">
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold text-white">Password</label>
          <input type="password" [(ngModel)]="user.password" name="password" class="form-control" placeholder="••••••••">
        </div>

        <div class="row">
          <div class="col-4 mb-3">
            <label class="form-label small fw-bold text-white">Age</label>
            <input type="number" [(ngModel)]="user.age" name="age" class="form-control" placeholder="25">
          </div>
          <div class="col-4 mb-3">
            <label class="form-label small fw-bold text-white">Weight (kg)</label>
            <input type="number" [(ngModel)]="user.weight" name="weight" class="form-control" placeholder="70">
          </div>
          <div class="col-4 mb-3">
            <label class="form-label small fw-bold text-white">Height (cm)</label>
            <input type="number" [(ngModel)]="user.height" name="height" class="form-control" placeholder="175">
          </div>
        </div>

        <button (click)="onRegister()" class="btn btn-primary btn-lg w-100 mt-3 shadow-sm py-2 fw-bold">
          Start My Journey
        </button>
      </form>
      
      <div class="text-center mt-4">
        <small class="text-muted">Already have an account? 
          <a href="javascript:void(0)" (click)="togglePage('login')" class="text-danger fw-bold text-decoration-none">Login</a>
        </small>
      </div>
    </div>
  </div>

</div>
