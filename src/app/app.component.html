<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
    <h2 class="text-center mb-4 text-primary fw-bold">NutriGenius</h2>
    <p class="text-center text-muted small">Create your account to stay healthy</p>

    <div class="mb-3">
      <label class="form-label small fw-bold">Full Name</label>
      <input type="text" [(ngModel)]="user.name" name="name" class="form-control form-control-lg" placeholder="e.g. John Doe">
    </div>

    <div class="mb-3">
      <label class="form-label small fw-bold">Email Address</label>
      <input type="email" [(ngModel)]="user.email" name="email" class="form-control form-control-lg" placeholder="name@example.com">
    </div>

    <div class="mb-3">
      <label class="form-label small fw-bold">Password</label>
      <input type="password" [(ngModel)]="user.password" name="password" class="form-control form-control-lg" placeholder="••••••••">
    </div>

    <div class="row">
      <div class="col-6 mb-3">
        <label class="form-label small fw-bold">Weight (kg)</label>
        <input type="number" [(ngModel)]="user.weight" name="weight" class="form-control" placeholder="70">
      </div>
      <div class="col-6 mb-3">
        <label class="form-label small fw-bold">Height (cm)</label>
        <input type="number" [(ngModel)]="user.height" name="height" class="form-control" placeholder="175">
      </div>
    </div>

    <button (click)="onRegister()" class="btn btn-primary btn-lg w-100 mt-3 shadow-sm" style="border-radius: 10px;">
      Register Now
    </button>
  </div>
</div>
