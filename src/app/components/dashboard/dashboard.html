<div class="dashboard-main">
  <!-- වම් පැත්ත: Profile සහ Graph -->
  <div class="side-panel">
    
    <!-- Profile & Stats Card -->
    <div class="card profile-card border-glow">
      <div class="user-header">
        <h5 class="fw-bold text-white mb-0">{{userName}}</h5>
        <p class="text-muted small mb-2">Fitness Member</p>
      </div>

      <div class="stat-grid">
        <div class="stat-item"><small>Weight</small><span>{{userWeight}}kg</span></div>
        <div class="stat-item"><small>Height</small><span>{{userHeight}}cm</span></div>
        <div class="stat-item"><small>Age</small><span>{{userAge}}y</span></div>
      </div>

      <div class="bmi-status-bar mt-2">
        <small class="text-white-50">Your BMI: </small>
        <span class="text-danger fw-bold">{{bmiValue}}</span>
        <span class="badge bg-success ms-2">{{bmiStatus}}</span>
      </div>
    </div>

    <!-- Weight Progress Card -->
    <div class="card graph-card border-glow">
      <h6 class="text-center text-white-50 small uppercase mb-2">Weight Progress</h6>
      <div class="chart-wrapper">
        <canvas id="weightChart"></canvas>
      </div>
    </div>

  </div>

  <!-- දකුණු පැත්ත: AI Chat -->
  <div class="chat-panel">
    <div class="card chat-card border-glow">
      <div class="chat-header">
        <h5 class="text-white mb-0"><i class="bi bi-robot me-2 text-danger"></i>AI Health Genius Chat</h5>
      </div>

      <div class="chat-body" #chatScrollContainer>
        <div *ngIf="messages.length === 0" class="empty-chat">
          <i class="bi bi-chat-dots fs-1 text-danger opacity-50"></i>
          <p class="text-white fw-bold mt-2">Welcome to NutriGenius!</p>
        </div>

        <div *ngFor="let msg of messages" [ngClass]="msg.type === 'ai' ? 'ai-msg' : 'user-msg'">
          <div class="bubble">{{msg.text}}</div>
        </div>

        <div *ngIf="isLoading" class="ai-msg">
          <div class="bubble d-flex align-items-center">
            <div class="spinner-grow spinner-grow-sm text-danger me-2"></div>
            <span class="small italic">Thinking...</span>
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <div class="input-group">
          <input type="text" [(ngModel)]="newMessage" class="form-control bg-dark text-white border-secondary" 
                 placeholder="Ask anything..." (keyup.enter)="sendToAi()">
          <button class="btn btn-danger px-4" (click)="sendToAi()" [disabled]="isLoading">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>
